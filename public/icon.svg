<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="iconGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa" />
      <stop offset="50%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#1e40af" />
    </radialGradient>
    <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="50%" style="stop-color:#d97706" />
      <stop offset="100%" style="stop-color:#b45309" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#iconGradient)" />
  
  <!-- AI LENS Logo -->
  <!-- Atom Core -->
  <circle cx="256" cy="256" r="20" fill="url(#atomGradient)" />
  
  <!-- Atom Orbits -->
  <ellipse cx="256" cy="256" rx="80" ry="30" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" />
  <ellipse cx="256" cy="256" rx="80" ry="30" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" transform="rotate(60 256 256)" />
  <ellipse cx="256" cy="256" rx="80" ry="30" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8" transform="rotate(120 256 256)" />
  
  <!-- Electrons -->
  <circle cx="336" cy="256" r="6" fill="#fbbf24" />
  <circle cx="176" cy="256" r="6" fill="#fbbf24" />
  <circle cx="296" cy="206" r="6" fill="#fbbf24" />
  <circle cx="216" cy="306" r="6" fill="#fbbf24" />
  <circle cx="296" cy="306" r="6" fill="#fbbf24" />
  <circle cx="216" cy="206" r="6" fill="#fbbf24" />
  
  <!-- AI Text -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">AI</text>
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="24" font-weight="normal" text-anchor="middle" fill="#e5e7eb">LENS</text>
